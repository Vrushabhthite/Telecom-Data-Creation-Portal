{% extends "base.html" %}
{% block content %}

<style>
/* ===== GLOBAL ===== */
body {
   
    font-family: 'Segoe UI', sans-serif;
}

/* Wrapper */
.main2-wrapper {
    max-width: 1100px;
    margin: auto;
}

/* Card */
.main2-card {
     background: var(--card-color);
    color: var(--text-color);
    border-radius: 16px;
    padding: 40px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* Title */
.main2-title {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 30px;
    text-align: center;
    color: #0d6efd;
}

/* Grid Layout */
.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 25px 40px;
}

/* Form Group */
.form-group {
    display: flex;
    flex-direction: column;
}

/* Labels */
label {
    font-weight: 500;
    color: #334155;
    margin-bottom: 6px;
}

/* Inputs */
.form-control,
.form-select {
    height: 45px;
    border-radius: 10px;
    border: 1px solid #cbd5e1;
}

/* File input */
input[type="file"] {
    padding: 10px;
}

/* Hover */
input[type="file"]:hover {
    border-color: #0d6efd;
}

/* Button */
.generate-btn {
    background: linear-gradient(90deg, #0d6efd, #2563eb);
    color: white;
    padding: 14px 40px;
    border: none;
    border-radius: 10px;
    font-weight: 600;
    transition: 0.3s;
    min-width: 250px;
}

.generate-btn:hover {
    background: linear-gradient(90deg, #0b5ed7, #1d4ed8);
    transform: translateY(-2px);
}

/* Error */
.error-box {
    background: #fee2e2;
    color: #b91c1c;
    padding: 10px;
    border-radius: 8px;
    margin-top: 15px;
}

/* Responsive */
@media (max-width: 768px) {
    .form-grid {
        grid-template-columns: 1fr;
    }
}
</style>

<div class="container mt-4 main2-wrapper">
    <div class="main2-card">

        <div class="main2-title">
            MAIN2 - Final Transformation
        </div>

        <form action="/generate_main2" method="POST" enctype="multipart/form-data">

            <!-- GRID -->
            <div class="form-grid">

                <!-- Circle -->
                <div class="form-group">
                    <label class="fw-bold">Circle</label>
                    <select name="circle" class="form-select">
                        {% for c in circles %}
                            <option value="{{ c }}">{{ c }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Main1 Output -->
                <div class="form-group">
                    <label class="fw-bold">Main1 Output File</label>
                    <input type="file" name="main1_file" class="form-control" required>
                </div>

                <!-- POC -->
                <div class="form-group">
                    <label>POC File</label>
                    <input type="file" name="poc_file" class="form-control">
                </div>

                <!-- POC Router -->
                <div class="form-group">
                    <label>POC Router File</label>
                    <input type="file" name="poc_router_file" class="form-control">
                </div>

                <!-- BSC -->
                <div class="form-group">
                    <label>BSC File</label>
                    <input type="file" name="bsc_file" class="form-control">
                </div>

            </div>
        </br>
            <!-- BUTTON -->
            <div class="text-center mt-4">
                <button type="submit" class="generate-btn">
                    Generate MAIN2 Output
                </button>

                {% if error %}
                <div class="error-box">
                    ⚠️ {{ error }}
                </div>
                {% endif %}
            </div>

        </form>

    </div>
</div>

{% endblock %}
