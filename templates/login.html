<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Modern Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
  
    overflow: hidden;
}

/* MAIN CONTAINER */
.main-container {
    display: flex;
    height: 100vh;
}

/* LEFT LOGIN PANEL */
.login-panel {
    width: 35%;
    background: #ffffff;   
    color: rgba(15, 23, 42, 0.9);  
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 2;
    box-shadow: 5px 0 25px rgba(0,0,0,0.1); 
    border: 1px solid black;
}

input {
    color: rgba(15, 23, 42, 0.9);
}

.login-box {
    width: 80%;
}


.animation-panel {
    width: 65%;
    position: relative;
    overflow: hidden;
    background-size: cover;
    background-position: center;
}


.wave:nth-child(2) {
    animation-duration: 15s;
    opacity: 0.4;
}

.wave:nth-child(3) {
    animation-duration: 20s;
    opacity: 0.2;
}

.bg-img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: contain;   
    background-color: #ee2839;
}


@keyframes waveMove {
    0% { transform: translate(-25%, -25%) rotate(0deg); }
    100% { transform: translate(-25%, -25%) rotate(360deg); }
}

/* INPUT STYLE */
.form-control {
    background: #f1f5f9;   
    border: 1px solid #cbd5e1;
    color: rgba(15, 23, 42, 0.9);  
}

.form-control::placeholder {
    color: #64748b;
}

.form-control:focus {
    background: #ffffff;
    color: rgba(15, 23, 42, 0.9);
    border: 1px solid #6366f1;
    box-shadow: 0 0 6px rgba(99,102,241,0.4);
}
/* BUTTON */
.btn-login {
    background: linear-gradient(90deg, #6366f1, #ec4899);
    border: none;
    transition: 0.3s;
}

.btn-login:hover {
    transform: scale(1.05);
}

/* LINKS */

.text-info {
    color: #2563eb !important;
}


</style>
</head>

<body>

<div class="main-container">

    <!-- LEFT LOGIN -->
    <div class="login-panel">
        <div class="login-box">

            <h3 class="mb-4">Login to system</h3>
            <p class="text-info mb-4">Enter your credentials</p>

            {% if request.query_params.get('error') %}
            <div class="alert alert-danger">
                {{ request.query_params.get('error') }}
            </div>
            {% endif %}

            <form method="post" action="/login">
                <input class="form-control mb-3" name="email" type="email" placeholder="Email" required>
                <input class="form-control mb-3" name="password" type="password" placeholder="Password" required>

                <button class="btn btn-login w-100 text-white">Login</button>
            </form>

            <p class="mt-3">
                Don't have an account? 
                <a href="/register_page">Register</a>
            </p>

        </div>
    </div>

    <!-- RIGHT ANIMATION -->
   <div class="animation-panel">
    <img src="/static/img/vi2.jpeg" class="bg-img">

    <div class="wave"></div>
    <div class="wave"></div>
    <div class="wave"></div>

    
</div>
</div>

</div>

</body>
</html>
