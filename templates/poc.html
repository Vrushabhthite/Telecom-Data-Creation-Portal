{% extends "base.html" %}

{% block content %}
<div class="card">
   <DIV class="transfor-title">
     POC DATA GENRATION
   </DIV>
   
    <form action="/poc_generate" method="POST" enctype="multipart/form-data">

        <div class="form-grid">

            <!-- Circle -->
            <div class="form-group">
                <label>CIRCLE</label>
                <select name="circle" required>
                <option value="APR">APR</option>
                <option value="ANE">ANE</option>
                <option value="BIH">BIH</option>
                <option value="DEL">DEL</option>
                <option value="GUJ">GUJ</option>
                <option value="HAR">HAR</option>
                <option value="HPR">HPR</option>
                <option value="JNK">JNK</option>
                <option value="KAR">KAR</option>
                <option value="KER">KER</option>
                <option value="MAH">MAH</option>
                <option value="MPC">MPC</option>             
                <option value="MUM">MUM</option>
                <option value="ODI">ODI</option>
                <option value="PJB">PJB</option>
                <option value="RAJ">RAJ</option>
                <option value="TNC">TNC</option>
                <option value="UPE">UPE</option>
                <option value="UPW">UPW</option>
                <option value="WBL">WBL</option>
                

        
            </select>
            </div>

            <!-- RAN -->
            <div class="form-group">
                <label>CEN-VS-RAN_COUNT_PANINDIA</label>
                <input type="file" name="ran_count_file" required>
            </div>

            <!-- Scope -->
            <div class="form-group">
                <label>SCOPE INVENTORY FILE</label>
                <input type="file" name="scope_inventory_file" required>
            </div>

            <!-- MW -->
            <div class="form-group">
                <label>RPT_MW_TREE_ALL_DETAILS_FINAL_RPT_MW_TREE_ALL_DETAILS_FINAL</label>
                <input type="file" name="mw_tree_file" required>
            </div>

            <!-- MTX -->
            <div class="form-group">
                <label>MTX_Vertive File</label>
                <input type="file" name="mtx_file" required>
            </div>

            <!-- Site Info -->
            <div class="form-group">
                <label>PROCESSED OUTPUT FILE</label>
                <input type="file" name="site_info_file" required>
            </div>

        </div>

        <button type="submit" class="btn-primary">
            Generate POC Output
        </button>
        {% if error %}
<div style="background:#fee2e2;color:#b91c1c;padding:10px;border-radius:5px;margin-bottom:15px;">
    ⚠️ {{ error }}
</div>
{% endif %}

    </form>
</div>

<style>
.form-grid {
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:20px;
    margin-bottom:25px;
}

.form-group {
    display:flex;
    flex-direction:column;
}

.form-group label {
    margin-bottom:6px;
    font-weight:500;
}

.form-group select,
.form-group input {
    padding:8px 10px;
    border:1px solid #ccc;
    border-radius:4px;
}

.btn-primary {
    background:#2563eb;
    color:white;
    padding:12px 20px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:600;
}

.btn-primary:hover {
    background:#1d4ed8;
}

.transfor-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 30px;
    
    color: #0d6efd;
}
</style>

{% endblock %}
