<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

/* MAIN */
.main-container {
    display: flex;
    height: 100vh;
}

/* LEFT PANEL */
.login-panel {
    width: 35%;
    background: #ffffff;
    color: rgba(15, 23, 42, 0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    box-shadow: 5px 0 25px rgba(0,0,0,0.1);
}

/* FORM BOX */
.login-box {
    width: 80%;
}

/* INPUT */
.form-control {
    background: #f1f5f9;
    border: 1px solid #cbd5e1;
    color: rgba(15, 23, 42, 0.9);
}

.form-control::placeholder {
    color: #64748b;
}

.form-control:focus {
    background: #ffffff;
    border: 1px solid #6366f1;
    box-shadow: 0 0 6px rgba(99,102,241,0.4);
}

/* BUTTON */
.btn-register {
    background: linear-gradient(90deg, #6366f1, #ec4899);
    border: none;
    color: white;
}

/* RIGHT PANEL */
.animation-panel {
    width: 65%;
    position: relative;
}

.bg-img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: contain;
    background-color: #ee2839;
}

/* TEXT */
.text-info {
    color: #2563eb !important;
}
</style>
</head>

<body>

<div class="main-container">

    <!-- LEFT -->
    <div class="login-panel">
        <div class="login-box">

            <h3 class="mb-4">Create Account</h3>
            <p class="text-info mb-4">Register your account</p>

            {% if request.query_params.get('error') %}
            <div class="alert alert-danger">
                {{ request.query_params.get('error') }}
            </div>
            {% endif %}

            <form method="post" action="/register">
                <input class="form-control mb-3" name="username" placeholder="Username" required>
                <input class="form-control mb-3" name="email" type="email" placeholder="Email" required>
                <input class="form-control mb-3" name="password" type="password" placeholder="Password" required>

                <button class="btn btn-register w-100">Register</button>
            </form>

            <p class="mt-3">
                Already have an account?
                <a href="/">Login</a>
            </p>

        </div>
    </div>

    <!-- RIGHT -->
    <div class="animation-panel">
        <img src="/static/img/vi2.jpeg" class="bg-img">
    </div>

</div>

</body>
</html>
